spring:
  application:
    name: journey-analysis

  datasource:
    url: jdbc:h2:mem:metro_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      encoding: UTF-8

  # HTTP 編碼設定
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  port: 8080
  # Tomcat 編碼設定
  tomcat:
    uri-encoding: UTF-8

logging:
  level:
    com.metro: DEBUG
    org.hibernate.SQL: DEBUG

